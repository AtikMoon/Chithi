<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Chithi</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;600;700&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
</head>
<body class="auth-page">

  <div class="bg-lines"></div>

  <div class="auth-wrap">
    <a href="index.html" class="logo auth-logo">
      <span class="logo-icon">✉</span>
      <span class="logo-text">Chithi</span>
    </a>

    <div class="auth-card">
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-sub">Sign in to read your letters.</p>

      <div id="auth-error" class="error-msg hidden"></div>

      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Your password" autocomplete="current-password" />
      </div>

      <button class="btn-primary btn-full" id="btn-login">
        <span id="login-btn-text">Sign In →</span>
        <span id="login-spinner" class="spinner hidden"></span>
      </button>

      <p class="auth-switch">Don't have an account? <a href="signup.html">Create one</a></p>
    </div>
  </div>

  <script type="module" src="firebase-config.js"></script>
  <script type="module" src="auth.js"></script>
</body>
</html>
