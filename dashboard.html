<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Inbox — Chithi</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;600;700&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
</head>
<body class="dashboard-page">

  <div class="bg-lines"></div>

  <!-- Navbar -->
  <header class="dash-nav">
    <a href="index.html" class="logo">
      <span class="logo-icon">✉</span>
      <span class="logo-text">Chithi</span>
    </a>
    <div class="dash-nav-right">
      <div class="user-pill" id="user-pill">
        <span class="user-dot"></span>
        <span id="nav-username">Loading…</span>
      </div>
      <button class="btn-ghost btn-sm" id="btn-logout">Sign Out</button>
    </div>
  </header>

  <main class="dash-main">
    <!-- Link Share Banner -->
    <div class="link-banner">
      <div class="link-banner-inner">
        <p class="link-banner-label">Your personal Chithi link</p>
        <div class="link-copy-row">
          <span class="link-display" id="user-link">Loading…</span>
          <button class="btn-copy" id="btn-copy-link" title="Copy link">
            <span id="copy-icon">⎘</span>
            <span id="copy-text">Copy</span>
          </button>
        </div>
        <p class="link-banner-hint">Share this link to start receiving messages!</p>
      </div>
    </div>

    <!-- Inbox Section -->
    <section class="inbox-section">
      <div class="inbox-header">
        <h2 class="inbox-title">Your Letters</h2>
        <span class="inbox-count" id="inbox-count">0 messages</span>
      </div>

      <!-- Loading state -->
      <div id="inbox-loading" class="inbox-empty">
        <div class="spinner-large"></div>
        <p>Fetching your letters…</p>
      </div>

      <!-- Empty state -->
      <div id="inbox-empty" class="inbox-empty hidden">
        <div class="empty-icon">✉</div>
        <h3>No letters yet</h3>
        <p>Share your link and invite people to send you messages.</p>
      </div>

      <!-- Messages list -->
      <div id="messages-list" class="messages-list hidden"></div>
    </section>
  </main>

  <script type="module" src="firebase-config.js"></script>
  <script type="module" src="inbox.js"></script>
</body>
</html>
